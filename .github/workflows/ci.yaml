name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.20.0
      - name: Create default Claude directories for tests
        run: |
          mkdir -p "$HOME/.claude/projects"
          mkdir -p "$HOME/.config/claude/projects"
      - name: Run Rust tests
        run: cargo test --manifest-path rust/Cargo.toml --workspace
      - name: Run package launcher tests
        run: TZ=UTC node --test apps/agent-burn/src/cli.test.ts

  release-binary:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build native binary
        run: cargo build --manifest-path rust/Cargo.toml --release --bin agent-burn
      - name: Smoke test CLI
        run: |
          rust/target/release/agent-burn --version
          rust/target/release/agent-burn --help
