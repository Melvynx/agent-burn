name: Build Windows native package
description: Build, stage, archive, and upload a Windows agent-burn native package
inputs:
  arch:
    description: Native package architecture
    required: true
  binary:
    description: Path to the built agent-burn binary
    required: true
runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-native-build-cache
      with:
        platform: win32

    - name: Build Cargo native binary
      shell: bash
      run: cargo build --manifest-path rust/Cargo.toml --release --bin agent-burn

    - name: Stage native package
      shell: bash
      env:
        ARCH: ${{ inputs.arch }}
        BINARY: ${{ inputs.binary }}
      run: |
        mkdir -p "packages/agent-burn-win32-$ARCH/bin"
        cp "$BINARY" "packages/agent-burn-win32-$ARCH/bin/agent-burn.exe"

    - name: Archive native package binary
      shell: bash
      env:
        ARCH: ${{ inputs.arch }}
      run: tar -cf "agent-burn-native-win32-$ARCH.tar" "packages/agent-burn-win32-$ARCH/bin"

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: agent-burn-native-win32-${{ inputs.arch }}
        path: agent-burn-native-win32-${{ inputs.arch }}.tar
        if-no-files-found: error
